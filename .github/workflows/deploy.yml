name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

# 핵심: 액션에 쓰기 권한을 명시적으로 부여합니다. (128 에러 해결)
permissions:
  contents: write

env:
  # Node.js 24 사용 강제 (경고 해결)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # index.html의 placeholder를 실제 Secret 값으로 교체
      - name: Replace API Key
        run: |
          sed -i 's/KAKAO_MAP_KEY_PLACEHOLDER/${{ secrets.KAKAO_MAP_KEY }}/g' index.html

      # 배포 실행
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . 
          branch: gh-pages # 배포용 브랜치