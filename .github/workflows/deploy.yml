name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

# 배포 권한 설정 (Node 24 및 Pages 배포 필수 권한)
permissions:
  contents: read
  pages: write
  id-token: write

env:
  # Node.js 20 경고 해결을 위한 설정
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # index.html의 Placeholder를 실제 Secret 키로 교체
      - name: Replace API Key
        run: |
          sed -i 's/KAKAO_MAP_KEY_PLACEHOLDER/${{ secrets.KAKAO_MAP_KEY }}/g' index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 현재 폴더 전체 업로드

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4